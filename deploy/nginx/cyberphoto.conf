server {
    listen 80;
    server_name photogongju.cn www.photogongju.cn;
    return 301 https://$server_name$request_uri;
}
server {
    listen 443 ssl http2;
    server_name photogongju.cn www.photogongju.cn;
    ssl_certificate /www/server/panel/vhost/cert/photogongju.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/photogongju.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header X-Frame-Options "SAMEORIGIN" always;
    access_log /www/wwwlogs/photogongju.access.log;
    error_log /www/wwwlogs/photogongju.error.log;
    location /css/ { alias /www/wwwroot/photogongju/node-server/public/css/; expires 30d; }
    location /js/  { alias /www/wwwroot/photogongju/node-server/public/js/;  expires 30d; }
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /python-api/ { return 403; }
}
