# ╔══════════════════════════════════════════════════════════════════════╗
# ║  PhotoGongju — 宝塔面板 Nginx 配置                                   ║
# ║  使用方式(宝塔):                                                      ║
# ║    1. 宝塔面板 → 网站 → 添加站点 → 填写域名                           ║
# ║    2. 站点设置 → 配置文件 → 粘贴本文件内容                             ║
# ║    3. 保存 → 重载 Nginx                                               ║
# ║  使用方式(原生):                                                      ║
# ║    sudo cp photogongju.conf /etc/nginx/sites-available/photogongju    ║
# ║    sudo ln -s /etc/nginx/sites-available/photogongju /etc/nginx/sites-enabled/ ║
# ║    sudo nginx -t && sudo systemctl reload nginx                       ║
# ║  关键功能:                                                            ║
# ║    - 反向代理 Node.js :3000 主站                                       ║
# ║    - 反向代理 Python :8001 AI 微服务                                   ║
# ║    - 静态资源 30 天缓存 + Gzip 压缩                                    ║
# ║    - 伪静态规则（SPA 路由支持）                                        ║
# ║    - 强制 HTTPS (取消注释 SSL 块即可启用)                              ║
# ║    - 人脸隐私合规：禁止外部直接访问 uploads/outputs 原始文件           ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ── 上游服务器定义 ──
upstream node_backend {
    # Node.js Express 主站 (Supervisor 管理)
    server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=30s;
    # 可添加更多实例实现负载均衡:
    # server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;  # 保持连接数，减少 TCP 握手开销
}

upstream python_backend {
    # Python FastAPI AI 微服务
    server 127.0.0.1:8001 weight=1 max_fails=3 fail_timeout=60s;
    keepalive 16;
}

# ═══════════════════════════════════════════════════════════════
# HTTP → 端口 80
# ═══════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    # 替换为实际域名
    server_name photogongju.example.com _;

    # ── 字符集 ──
    charset utf-8;

    # ── 日志（宝塔默认路径） ──
    access_log /www/wwwlogs/photogongju_access.log;
    error_log  /www/wwwlogs/photogongju_error.log;

    # ── 上传大小限制 ──
    client_max_body_size 50m;
    client_body_buffer_size 256k;
    client_header_timeout 60s;
    client_body_timeout 120s;

    # ════════════════════════════════════════════════
    # Gzip 压缩配置
    # ════════════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/atom+xml
        application/rss+xml
        application/vnd.ms-fontobject
        font/truetype
        font/opentype
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;
    # 不压缩已压缩的格式
    gzip_disable "msie6";

    # ════════════════════════════════════════════════
    # 安全响应头
    # ════════════════════════════════════════════════
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # 生产环境启用 HSTS (取消注释):
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ════════════════════════════════════════════════
    # 静态资源 — 长期缓存 (30天)
    # CSS/JS 文件名带 hash 时可设为 immutable
    # ════════════════════════════════════════════════
    location ~* ^/(css|js|images|fonts|img|assets)/.*\.(css|js|jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|ttf|eot|otf)$ {
        root /opt/photogongju/node_web/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        try_files $uri =404;
    }

    # ════════════════════════════════════════════════
    # 静态 HTML 文件 短期缓存
    # ════════════════════════════════════════════════
    location ~* \.(html|htm)$ {
        root /opt/photogongju/node_web/public;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ════════════════════════════════════════════════
    # robots.txt / favicon.ico
    # ════════════════════════════════════════════════
    location = /robots.txt {
        root /opt/photogongju/node_web/public;
        expires 7d;
        access_log off;
    }
    location = /favicon.ico {
        root /opt/photogongju/node_web/public;
        expires 7d;
        access_log off;
        try_files $uri =204;
    }

    # ════════════════════════════════════════════════
    # Python AI 微服务 API — /api/v1/*
    # ════════════════════════════════════════════════
    location /api/v1/ {
        # 反向代理到 Python FastAPI
        proxy_pass http://python_backend;

        # 长连接复用
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 代理头 — 传递客户端真实信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # ★ 传递会员等级标识给 AI 服务
        proxy_set_header X-User-Tier $http_x_user_tier;

        # 超时 — AI 处理可能耗时较长
        proxy_connect_timeout 30s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;

        # 关闭缓冲 — 流式传输图片数据
        proxy_buffering off;
        proxy_request_buffering off;

        # 上传大小
        client_max_body_size 50m;

        # 重试
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ════════════════════════════════════════════════
    # Swagger / ReDoc API 文档
    # ════════════════════════════════════════════════
    location ~* ^/(docs|redoc|openapi\.json) {
        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API 文档页限制访问 IP（可选，取消注释启用）
        # allow 你的办公IP;
        # deny all;
    }

    # ════════════════════════════════════════════════
    # 处理结果下载 — /api/download/*
    # ════════════════════════════════════════════════
    location /api/download/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 下载可能较慢
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # ════════════════════════════════════════════════
    # 健康检查 — 不记录日志
    # ════════════════════════════════════════════════
    location ~* ^/(api/)?health {
        proxy_pass http://node_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ════════════════════════════════════════════════
    # Node.js 主站 — 所有其他请求（兜底规则）
    # ════════════════════════════════════════════════
    location / {
        # 反向代理到 Express
        proxy_pass http://node_backend;

        # HTTP/1.1 长连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # WebSocket 支持（如有实时通知功能）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 超时
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 关闭缓冲（EJS 动态页面不应缓冲）
        proxy_buffering off;
    }

    # ════════════════════════════════════════════════
    # 安全防护 — 禁止访问敏感文件/目录
    # ════════════════════════════════════════════════
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* /(node_modules|__pycache__|\.git|\.env|\.svn|\.hg) {
        deny all;
        return 403;
    }

    # ★ 人脸隐私合规 — 禁止外部直接访问上传/输出临时目录
    location ~* /(uploads|outputs|temp)/ {
        internal;  # 仅允许内部重定向（X-Accel-Redirect），禁止外部直接访问
    }

    # ════════════════════════════════════════════════
    # 伪静态 — SPA 路由回退（如果前端改用 SPA）
    # ════════════════════════════════════════════════
    # 当前使用 EJS 服务端渲染，无需 SPA fallback
    # 如未来改用 Vue/React，取消下面注释:
    # location / {
    #     try_files $uri $uri/ /index.html;
    # }

    # ════════════════════════════════════════════════
    # 自定义 404 / 50x 错误页面
    # ════════════════════════════════════════════════
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /opt/photogongju/node_web/public;
    }
}

