# ═══════════════════════════════════════════════════════════════
# 宝塔面板兼容说明:
# ═══════════════════════════════════════════════════════════════
# 1. 宝塔中创建站点后，本配置会注入到:
#    /www/server/panel/vhost/nginx/photogongju.example.com.conf
# 2. 静态资源缓存规则也可通过宝塔「性能调整」页面设置
# 3. SSL 证书可通过宝塔「SSL」页面申请 Let's Encrypt 免费证书
# 4. 伪静态规则在宝塔「伪静态」标签页管理
# 5. 反向代理规则在宝塔「反向代理」标签页管理(可直接用本配置替代)
